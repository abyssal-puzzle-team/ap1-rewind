<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>章节详情</title>
    <style>
        :root {
            --bg: #f8f5f0;
            --text: #2c2825;
            --accent: #8b4513;
            --accent-hover: #5a2e0c;
            --card-bg: #fff;
            --border: #e8e0d5;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --transition: 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft Yahei", "SimHei", "PingFang SC", sans-serif;
            background: var(--bg);  /* 纯色背景 */
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* 初始隐藏所有需加载的内容 */
        .hidden-init {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .visible-init {
            visibility: visible;
            opacity: 1;
        }

        /* 固定左上角返回按钮 */
        .back-buttons {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
        }
        .back-btn-mini {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: transparent;
            color: var(--accent);
            text-decoration: none;
            border-radius: 4px;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
            border: 1.5px solid var(--accent);
            transition: all var(--transition);
            white-space: nowrap;
        }
        .back-btn-mini:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-1px);
        }

        /* 顶部大图 */
        .header-container {
            position: relative;
            width: 100%;
            height: 50vh;
            border-bottom-left-radius: 90%;
            border-bottom-right-radius: 90%;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            background: #3a2f28;
        }
        .header-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
        }
        .mask {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.75));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .mask-title {
            font-size: clamp(2.2rem, 7vw, 4.5rem);
            color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
            font-weight: bold;
            letter-spacing: 3px;
            text-align: center;
        }
        .mask-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: rgba(255,255,255,0.8);
            letter-spacing: 2px;
            font-weight: 300;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* 剧情区域 */
        .story-box {
            background: #fff;
            padding: 35px;
            border-radius: var(--radius);
            margin-bottom: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .story-box h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--accent);
            border-bottom: 2px solid #e8d8c8;
            padding-bottom: 12px;
            letter-spacing: 1px;
        }
        .story-box p {
            font-size: 17px;
            text-indent: 2em;
            margin-bottom: 15px;
            color: #3a3530;
            line-height: 1.8;
        }
        .story-box img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 15px 0;
        }

        /* 谜题列表 */
        .topic-list {
            background: #fff;
            padding: 35px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .topic-list h2 {
            font-size: 22px;
            margin-bottom: 25px;
            color: var(--accent);
            border-bottom: 2px solid #e8d8c8;
            padding-bottom: 12px;
            letter-spacing: 1px;
        }
        .topic-list ul { list-style: none; }
        .topic-list li {
            margin: 12px 0;
            border-radius: 8px;
            background: #f9f5f0;
            transition: all var(--transition);
            border-left: 4px solid transparent;
            overflow: hidden;
        }
        .topic-list li:hover {
            background: #f0e8df;
            transform: translateX(8px);
            border-left-color: var(--accent);
        }
        .topic-list li a {
            text-decoration: none;
            color: var(--accent);
            font-size: 20px;
            font-weight: 500;
            display: block;
            padding: 12px 16px;
        }
        .topic-list li a:hover { color: var(--accent-hover); }

        @media (max-width: 768px) {
            .header-container { height: 40vh; border-bottom-left-radius: 70%; border-bottom-right-radius: 70%; }
            .container { padding: 24px 14px; }
            .story-box, .topic-list { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <!-- 固定左上角返回按钮（始终可见） -->
    <div class="back-buttons">
        <a href="index.html" class="back-btn-mini">← 返回</a>
    </div>

    <!-- 顶部大图（初始隐藏） -->
    <div class="header-container hidden-init" id="headerContainer">
        <img src="" alt="背景图" class="header-img" id="headerImg">
        <div class="mask">
            <h1 class="mask-title" id="headerTitle">章节</h1>
            <p class="mask-subtitle" id="headerSubtitle"></p>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="container hidden-init" id="mainContent">
        <p style="text-align:center;color:#999;padding:60px;">加载中...</p>
    </div>

    <script src="./puzzle_data.js"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const chapterId = parseInt(params.get('id'));
            if (!chapterId) {
                document.getElementById('mainContent').innerHTML = '<p style="text-align:center;color:#c62828;padding:60px;">缺少章节参数。</p>';
                return;
            }

            // 隐藏元素引用
            const headerEl = document.getElementById('headerContainer');
            const mainEl = document.getElementById('mainContent');

            async function init() {
                const data = puzzleData;
                
                const chapter = data.chapters.find(c => c.id === chapterId);
                if (!chapter) {
                    mainEl.innerHTML = '<p style="text-align:center;color:#c62828;">章节未找到。</p>';
                    mainEl.classList.remove('hidden-init');
                    mainEl.classList.add('visible-init');
                    return;
                }

                // 设置头部信息
                document.getElementById('headerTitle').textContent = '#' + chapter.id + ' ' + chapter.name;
                document.getElementById('headerSubtitle').textContent = chapter.puzzle_count + ' 道谜题';

                const headerImg = document.getElementById('headerImg');
                headerImg.src = 'img/' + (chapter.image || 'placeholder.png');
                headerImg.onerror = () => {
                    headerImg.style.display = 'none';
                    document.getElementById('headerContainer').style.background = 'linear-gradient(135deg, #3a2f28, #5a3e2b)';
                };

                // 构建内容
                let html = '';
                html += '<div class="story-box">';
                html += '<h2>【剧情】</h2>';
                const story = chapter.story || chapter.news_description || '';
                if (story.trim()) {
                    html += story;
                } else {
                    html += '<p style="color:#999;font-style:italic;">剧情内容待补充……</p>';
                }
                if (chapter.news_url) {
                    html += '<p style="margin-top:12px;text-indent:0;"><a href="' + chapter.news_url + '" target="_blank" style="color:#8b4513;">原始文章</a></p>';
                }
                html += '</div>';

                html += '<div class="topic-list" id="topic-list">';
                html += '<h2>【谜题】</h2><ul>';
                chapter.puzzle.forEach(p => {
                    html += '<li><a href="puzzle.html?chapter=' + chapterId + '&puzzle=' + p.id + '">' + p.name + '</a></li>';
                });
                html += '</ul></div>';

                mainEl.innerHTML = html;

                // 收集页面内所有图片（包括header背景图）
                const allImages = document.querySelectorAll('img');
                const imageLoadPromises = Array.from(allImages).map(img => {
                    return new Promise((resolve) => {
                        if (!img.src || img.src.startsWith('data:')) {
                            resolve();
                            return;
                        }
                        if (img.complete) {
                            resolve();
                        } else {
                            img.onload = () => resolve();
                            img.onerror = () => resolve();
                        }
                    });
                });

                // 最多等待 5 秒
                const timeout = new Promise(resolve => setTimeout(resolve, 5000));
                await Promise.race([Promise.all(imageLoadPromises), timeout]);

                // 滚动到锚点（无动画，避免二次跳动）
                if (window.location.hash) {
                    const target = document.querySelector(window.location.hash);
                    if (target) {
                        window.scrollTo({
                            top: target.offsetTop,
                            behavior: 'instant'
                        });
                    }
                }

                // 显示所有内容
                headerEl.classList.remove('hidden-init');
                headerEl.classList.add('visible-init');
                mainEl.classList.remove('hidden-init');
                mainEl.classList.add('visible-init');
            }

            init();
        })();
    </script>
</body>
</html>
